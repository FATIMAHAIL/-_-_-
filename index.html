<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد بطاقات تهنئة رمضان</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alexandria:wght@100..900&display=swap');
    </style>
    <style>
        .alexandria-uniquifier {
            font-family: "Alexandria", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: bold;
        }
        
        body {
            font-family: 'Alexandria', sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            color: #8e6c6c;
        }
        
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
        }
        
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            font-weight: bold;
        }
        
        .btn-generate {
            background-color: #a87d7d;
            color: white;
        }
        
        .btn-generate:hover {
            background-color: #8e6c6c;
        }
        
        .btn-download {
            background-color: #27ae60;
            color: white;
            display: none;
        }
        
        #preview {
            width: 100%;
            margin-top: 20px;
            border-radius: 15px;
            display: none;
            border: 2px solid #eee;
        }
        
        canvas {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>أهلاً بك في صانع البطاقات 🌙</h2>
        <p>1. اختر صورة البطاقة من جهازك</p>
        <input type="file" id="imageUpload" accept="image/*">

        <p>2. اكتب الاسم المراد إضافته</p>
        <input type="text" id="userName" placeholder="اكتب الاسم هنا...">

        <button class="btn-generate" onclick="generateCard()">توليد البطاقة الآن</button>

        <img id="preview" alt="معاينة البطاقة">

        <button id="downloadBtn" class="btn-download" onclick="downloadImage()">تحميل البطاقة بجودة عالية</button>
    </div>

    <canvas id="cardCanvas"></canvas>

    <script>
        function generateCard() {
            const fileInput = document.getElementById('imageUpload');
            const name = document.getElementById('userName').value;
            const canvas = document.getElementById('cardCanvas');
            const ctx = canvas.getContext('2d');
            const preview = document.getElementById('preview');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!fileInput.files[0] || !name.trim()) {
                alert("يرجى اختيار الصورة وكتابة الاسم أولاً!");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // ضبط أبعاد الكانفاس لتطابق الصورة
                    canvas.width = img.width;
                    canvas.height = img.height;

                    // رسم الصورة
                    ctx.drawImage(img, 0, 0);

                    // إعدادات النص
                    const fontSize = Math.floor(canvas.width * 0.06);
                    ctx.font = `bold ${fontSize}px 'Tajawal'`;
                    ctx.fillStyle = "#000000";
                    ctx.textAlign = "center";

                    // تحديد مكان النص (82% من الارتفاع)
                    const xPos = canvas.width / 2;
                    const yPos = canvas.height * 0.76;

                    ctx.fillText(name, xPos, yPos);

                    // تحديث المعاينة
                    preview.src = canvas.toDataURL('image/png');
                    preview.style.display = "block";
                    downloadBtn.style.display = "block";
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(fileInput.files[0]);
        }

        function downloadImage() {
            const canvas = document.getElementById('cardCanvas');
            const link = document.createElement('a');
            link.download = 'Ramadan_Greeting.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>

</html>
